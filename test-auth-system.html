    <script>
        // CONSOLE FLOOD PROTECTION
        (function() {
            const originalWarn = console.warn;
            const originalLog = console.log;
            const warningCounts = new Map();
            const MAX_REPEATS = 3;
            
            function isSpam(message) {
                const spamPatterns = [
                    'updateLogic aborted',
                    'Scene components not fully initialized',
                    'Loading progress:',
                    'Dependency status:',
                    'WatchDogAnimator',
                    'Guardian3D',
                    'YT-Player',
                    'init aborted'
                ];
                return spamPatterns.some(p => message.includes(p));
            }
            
            console.warn = function(...args) {
                const msg = args.join(' ');
                if (isSpam(msg)) {
                    const count = warningCounts.get(msg) || 0;
                    if (count >= MAX_REPEATS) return;
                    warningCounts.set(msg, count + 1);
                    if (count === MAX_REPEATS - 1) {
                        originalWarn.call(console, '[CONSOLE FLOOD PROTECTION] Suppressing repeated warnings...');
                        return;
                    }
                }
                originalWarn.apply(console, args);
            };
            
            // Throttle progress logs
            let lastProgress = 0;
            console.log = function(...args) {
                const msg = args.join(' ');
                if (msg.includes('Loading progress:')) {
                    const match = msg.match(/(\d+)%/);
                    if (match) {
                        const progress = parseInt(match[1]);
                        if (progress - lastProgress < 10 && progress !== 100) return; // Only log every 10%
                        lastProgress = progress;
                    }
                }
                originalLog.apply(console, args);
            };
        })();
    </script>

    <!-- 🚨 ERROR CAPTURE SYSTEM (from actly.md) 🚨 -->
    <script>
        // ERROR CAPTURE SYSTEM
        window.allErrors = [];
        window.originalConsoleError = console.error;
        window.originalConsoleWarn = console.warn;

        console.error = function(...args) {
            window.allErrors.push({
                type: 'error',
                message: args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' '),
                stack: new Error().stack,
                timestamp: new Date().toISOString()
            });
            window.originalConsoleError.apply(console, args);
        };

        console.warn = function(...args) {
            window.allErrors.push({
                type: 'warn',
                message: args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' '),
                timestamp: new Date().toISOString()
            });
            window.originalConsoleWarn.apply(console, args);
        };

        window.addEventListener('error', (e) => {
            window.allErrors.push({
                type: 'uncaught',
                message: e.message,
                filename: e.filename,
                lineno: e.lineno,
                colno: e.colno,
                timestamp: new Date().toISOString()
            });
        });

        window.addEventListener('unhandledrejection', (e) => {
            window.allErrors.push({
                type: 'promise_rejection',
                message: e.reason?.message || String(e.reason),
                timestamp: new Date().toISOString()
            });
        });

        // Capture network errors
        const originalFetch = window.fetch;
        window.fetch = async function(...args) {
            try {
                const response = await originalFetch.apply(this, args);
                if (!response.ok) {
                    console.error(`[Network Error] ${response.status} ${args[0]}`);
                }
                return response;
            } catch (err) {
                console.error(`[Network Error] Failed: ${args[0]}`, err.message);
                throw err;
            }
        };

        console.log('✅ Error and Network capture system active.');
    </script>

    <!-- Emergency Initialization Fix -->
    <script>
    // Console flood protection (FIX 4)
    (function() {
        const MAX_LOGS = 100;
        let logCount = 0;
        const originalWarn = console.warn;
        const originalError = console.error;
        
        function createLimitedLogger(original, type) {
            return function(...args) {
                logCount++;
                if (logCount <= MAX_LOGS) {
                    original.apply(console, args);
                } else if (logCount === MAX_LOGS + 1) {
                    original.call(console, `[CONSOLE FLOOD PROTECTION] Further ${type} messages suppressed`);
                }
            };
        }
        
        console.warn = createLimitedLogger(originalWarn, 'warnings');
        console.error = createLimitedLogger(originalError, 'errors');
        
        setInterval(() => {
            if (logCount > MAX_LOGS) {
                console.warn('[CONSOLE] Log limit reset, resuming output');
            }
            logCount = 0;
        }, 10000);
    })();

    (function emergencyInit() {
        console.log('[EmergencyInit] Starting...');
        
        // CIRCUIT BREAKER (FIX 1)
        const MAX_RETRIES = 3;
        const scriptKey = 'yt-player-init-failures';
        let failures = parseInt(sessionStorage.getItem(scriptKey) || '0');
        
        if (failures >= MAX_RETRIES) {
            console.error('[EmergencyInit] CIRCUIT BREAKER: Max retries reached. Stopping attempts.');
            const container = document.getElementById('loading-overlay') || document.body;
            container.innerHTML = `
                <div style="padding: 40px; text-align: center; font-family: sans-serif; color: white; background: #0f0f0f; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                    <h2 style="color: #ff4d4d;">⚠️ Player Load Failed</h2>
                    <p>The video player could not be loaded after ${MAX_RETRIES} attempts.</p>
                    <button onclick="sessionStorage.removeItem('${scriptKey}'); location.reload()" 
                            style="padding: 15px 30px; font-size: 16px; cursor: pointer; background: #00d4ff; border: none; border-radius: 5px; color: black; font-weight: bold; margin-top: 20px;">
                        Retry Now
                    </button>
                </div>
            `;
            return;
        }

        // Fix 1: Hide loader after max 3 seconds regardless
        setTimeout(() => {
            const loaders = ['loading-overlay', 'loading-text', 'loading-percentage'];
            loaders.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.style.display = 'none';
                    el.style.opacity = '0';
                }
            });
            console.log('[EmergencyInit] Loader hidden');
        }, 3000);
        
        // Fix 2: Retry failed script loads
        window.addEventListener('error', (e) => {
            if (e.target.tagName === 'SCRIPT') {
                const src = e.target.src;
                console.warn('[EmergencyInit] Script failed:', src);
                
                // Retry with corrected path
                if (src.includes('layout-bootstrap.js')) {
                    const newScript = document.createElement('script');
                    newScript.src = './layout-bootstrap.js';
                    document.head.appendChild(newScript);
                }
                if (src.includes('yt-player.init.js')) {
                    // Increment failures (FIX 1)
                    sessionStorage.setItem(scriptKey, (failures + 1).toString());
                    
                    const newScript = document.createElement('script');
                    newScript.src = './yt-player/yt-player.init.js';
                    document.head.appendChild(newScript);
                }
            }
        }, true);
        
        // Fix 3: Force show main content
        setTimeout(() => {
            const app = document.getElementById('app') || document.getElementById('main');
            if (app) {
                app.style.display = 'block';
                app.style.opacity = '1';
            }
        }, 3500);
    })();
    </script>

    <!-- Progress Bar & Engine Initialization -->
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const progressFill = document.getElementById('loading-progress-bar');
        const percentageText = document.getElementById('loading-percentage');
        const statusText = document.getElementById('loading-text');
        const overlay = document.getElementById('loading-overlay');

        const steps = [
            { limit: 20, message: "Authenticating Session..." },
            { limit: 45, message: "Connecting to CodeBank Assets..." },
            { limit: 70, message: "Loading Architecture Core..." },
            { limit: 90, message: "Initializing Media Players..." },
            { limit: 100, message: "Ready. Launching..." }
        ];

        let progress = 0;
        let isEngineInitiated = false;

        // Visual progress driver
        const visualTimer = setInterval(() => {
            if (!isEngineInitiated && progress < 90) {
                progress += Math.random() * 2; // Slow creep to 90%
            } else if (isEngineInitiated) {
                progress += 5; // Fast zoom to 100%
            }

            if (progress >= 100) {
                progress = 100;
                clearInterval(visualTimer);
                if (progressFill) progressFill.style.width = "100%";
                if (percentageText) percentageText.textContent = "100%";
                if (statusText) {
                    statusText.textContent = steps[4].message;
                    statusText.style.color = "#00ff88";
                }
                
                setTimeout(() => {
                    if (overlay) {
                        overlay.style.opacity = '0';
                        overlay.style.transition = 'opacity 0.6s ease';
                        setTimeout(() => overlay.style.display = 'none', 600);
                    }
                }, 300);
                return;
            }

            if (progressFill) progressFill.style.width = progress + "%";
            if (percentageText) percentageText.textContent = Math.floor(progress) + "%";

            const currentStep = steps.find(s => progress <= s.limit);
            if (currentStep && statusText && statusText.textContent !== currentStep.message) {
                statusText.textContent = currentStep.message;
            }
        }, 50);

        // Actual initiation logic hook
        const attemptInit = () => { 
            const ac = window.AuthCore;
            const s = ac?._state;
            
            // Check auth state from AuthCore directly OR sniff local storage for a direct pass
            const token = s?.sessionId || localStorage.getItem('session_token');
            const hasDirectPass = token && localStorage.getItem('session_active') === "true";
            const meetsCondition = (s?.authenticated && s?.sessionId) || hasDirectPass;
            
            // 🛡️ Enhanced Dependency Check (from actly.md)
            function checkDependencies() {
                const deps = {
                    AuthCore: typeof window.AuthCore !== 'undefined',
                    AssetBus: typeof window.AssetBus !== 'undefined',
                    // التعديل: التحقق من وجود الكائن أو تجاوز الفحص إذا كنا في Local Mode
                    YTPlayer: !!(window.YTPlayer || document.getElementById('player'))
                };
                console.log('[Init] Dependency status:', deps);
                return deps.AuthCore && (deps.AssetBus || deps.YTPlayer);
            }

            if (meetsCondition && checkDependencies() && !window._initAfterLoginCalled && window.initAfterLogin) { 
                window._initAfterLoginCalled = true; 
                
                // Polyfill state if AuthCore is lagging locally
                if (ac && (!s?.authenticated)) {
                    ac._state.authenticated = true;
                    ac._state.status = 'authenticated';
                    ac._state.sessionId = token;
                }

                try {
                    console.log('✅ YT-Clear Init: Auto-initialized engine with token and dependencies');
                    window.initAfterLogin(token, s?.user || {id: s?.userId || localStorage.getItem('user_id')}); 
                } catch (e) {
                    console.error('Error during initAfterLogin', e);
                }

                isEngineInitiated = true; // Signals UI to finish!
                return true;
            } 
            return false;
        }; 

        if (!attemptInit()) {
            const authPolling = setInterval(() => {
                if (attemptInit()) clearInterval(authPolling);
            }, 200);
            
            // Fallback timeout (from actly.md)
            setTimeout(() => {
                clearInterval(authPolling);
                if (!isEngineInitiated) {
                    console.warn("⚠️ Engine Initiation Timeout - Attempting Fallback Init");
                    
                    // Hide loader and show UI anyway
                    const loader = document.getElementById('loading-overlay');
                    if (loader) {
                        loader.style.opacity = '0';
                        setTimeout(() => loader.style.display = 'none', 600);
                    }
                    document.getElementById('app')?.style.setProperty('display', 'block');
                    
                    isEngineInitiated = true; 

                    // Try one last blind pass if we have a token
                    if (!window._initAfterLoginCalled && window.initAfterLogin && localStorage.getItem('session_token')) {
                         window._initAfterLoginCalled = true; 
                         console.log('[Init] Forced fallback init after timeout');
                         window.initAfterLogin(localStorage.getItem('session_token'), {id: localStorage.getItem('user_id')});
                    }
                }
            }, 8000); // 🚀 Slightly reduced from 12s for better UX
        }
    });
    </script> 
    
    <!-- Emergency Force YT-Player Ready State (FIX 6) -->
    <script>
    // EMERGENCY: Force YT-Player ready after timeout
    const EMERGENCY_TIMEOUT = 15000; // 15 seconds to allow 3D model loading
    setTimeout(() => {
        if (!window.YTPlayerReady && !window.ytPlayerForced) {
            console.warn('[EMERGENCY] Forcing YT-Player ready state');
            window.ytPlayerForced = true;
            window.YTPlayerReady = true;
            window.YTPlayer = window.YTPlayer || { isReady: true };
            
            // Dispatch ready event
            window.dispatchEvent(new CustomEvent('yt-player-ready', {
                detail: { player: window.YTPlayerInit?.player || null, forced: true }
            }));
            
            // Update dependency status
            if (window.updateDependencyStatus) {
                window.updateDependencyStatus('YTPlayer', true);
            }

            if (window.AuthCore) {
                console.log('🛡️ Self-Healing: Prevented unnecessary reload');
            }
        }
    }, EMERGENCY_TIMEOUT);
    </script>
