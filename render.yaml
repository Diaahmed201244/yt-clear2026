services:
  - type: web
    name: ytclear-server
    runtime: node
    region: frankfurt
    buildCommand: |
      echo "Node version: $(node -v)"
      echo "NPM version: $(npm -v)"
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true npm ci --production
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.11.0
      - key: NPM_CONFIG_TIMEOUT
        value: "300000"
      - key: NPM_CONFIG_REGISTRY
        value: "https://registry.npmjs.org/"
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "true"