<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeCode - Secure Assets</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f172a;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(30, 41, 59, 0.5);
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #3b82f6;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(52, 211, 153, 0.2);
            border: 1px solid rgba(52, 211, 153, 0.3);
            border-radius: 20px;
            font-size: 14px;
            color: #34d399;
        }

        .status-indicator.offline {
            background: rgba(248, 113, 113, 0.2);
            border: 1px solid rgba(248, 113, 113, 0.3);
            color: #f87171;
        }

        /* 3D Watchdog Section */
        .watchdog-section {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 24px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 16px;
            padding: 16px 24px;
            overflow: hidden;
        }

        #watchdog-3d-container {
            width: 200px;
            height: 200px;
            flex-shrink: 0;
            border-radius: 12px;
            background: radial-gradient(ellipse at center, #1e293b 0%, #0f172a 100%);
            overflow: hidden;
            position: relative;
        }

        .watchdog-info {
            flex: 1;
        }

        .watchdog-info h2 {
            font-size: 18px;
            font-weight: 700;
            color: #e2e8f0;
            margin-bottom: 6px;
        }

        .watchdog-state-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 10px;
            background: rgba(52, 211, 153, 0.15);
            border: 1px solid rgba(52, 211, 153, 0.3);
            color: #34d399;
        }

        .watchdog-state-badge.sleeping {
            background: rgba(148, 163, 184, 0.15);
            border-color: rgba(148, 163, 184, 0.3);
            color: #94a3b8;
        }

        .watchdog-state-badge.alert {
            background: rgba(248, 113, 113, 0.15);
            border-color: rgba(248, 113, 113, 0.3);
            color: #f87171;
        }

        .watchdog-state-badge .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .watchdog-desc {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.55);
            line-height: 1.5;
        }

        /* Assets area */
        .content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .card {
            background: rgba(30, 41, 59, 0.5);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.5);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .asset-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .asset-tab {
            padding: 10px 20px;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .asset-tab.active {
            background: #3b82f6;
            border-color: #3b82f6;
            color: white;
        }

        .asset-tab:hover {
            background: rgba(59, 130, 246, 0.2);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .asset-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }

        .asset-item {
            background: rgba(30, 41, 59, 0.8);
            border-radius: 10px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }

        .asset-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        }

        .asset-item h3 {
            font-size: 16px;
            margin-bottom: 8px;
            color: #f1f5f9;
        }

        .asset-item p {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 4px;
        }

        .asset-value {
            font-size: 20px;
            font-weight: 700;
            color: #34d399;
            margin-top: 10px;
        }

        .codes-value { color: #3b82f6; }
        .silver-value { color: #94a3b8; }
        .gold-value { color: #fbbf24; }

        @media (max-width: 768px) {
            .watchdog-section {
                flex-direction: column;
                align-items: flex-start;
            }
            #watchdog-3d-container {
                width: 100%;
                height: 180px;
            }
            .asset-list {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-shield-halved"></i> Safe Assets</h1>
            <div class="status-indicator" id="status-indicator">
                <i class="fas fa-circle"></i>
                <span id="status-text">Connecting...</span>
            </div>
        </div>

        <!-- 3D Watchdog -->
        <div class="watchdog-section">
            <div id="watchdog-3d-container"></div>
            <div class="watchdog-info">
                <h2>Guardian Watchdog</h2>
                <div class="watchdog-state-badge" id="watchdog-badge">
                    <span class="dot"></span>
                    <span id="watchdog-state-text">Loading...</span>
                </div>
                <p class="watchdog-desc" id="watchdog-desc">
                    Your 3D watchdog guards your safe assets. Keep it fed to maintain active protection.
                </p>
            </div>
        </div>

        <div class="content">
            <div class="card">
                <div class="asset-tabs">
                    <div class="asset-tab active" data-tab="codes">
                        <i class="fas fa-code"></i> Codes
                    </div>
                    <div class="asset-tab" data-tab="silver">
                        <i class="fas fa-coins"></i> Silver
                    </div>
                    <div class="asset-tab" data-tab="gold">
                        <i class="fas fa-gem"></i> Gold
                    </div>
                </div>

                <div id="loading-container" class="loading">
                    <div class="loading-spinner"></div>
                    <p>Loading assets...</p>
                </div>

                <div id="empty-state" class="empty-state" style="display: none;">
                    <i class="fas fa-inbox"></i>
                    <p>No assets available. Generate codes or activate Extra Mode to get started.</p>
                </div>

                <div id="codebank-assets-tab">
                    <div class="safe-container asset-list" id="asset-list-container" style="display: none;"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { createWatchDog } from '/shared/watchdog-core/watchdog-core.js';
        import { STATES } from '/shared/watchdog-core/watchdog-states.js';

        // --- 3D Watchdog init ---
        const watchdogContainer = document.getElementById('watchdog-3d-container');
        const badge = document.getElementById('watchdog-badge');
        const badgeText = document.getElementById('watchdog-state-text');
        const descEl = document.getElementById('watchdog-desc');

        let watchdog = null;

        const STATE_META = {
            [STATES.IDLE]: {
                label: 'Active',
                cls: '',
                desc: 'Your watchdog is on duty and guarding your assets.'
            },
            [STATES.WATCHING]: {
                label: 'Watching',
                cls: '',
                desc: 'Watchdog is actively monitoring your account for anomalies.'
            },
            [STATES.ALERT]: {
                label: 'Alert',
                cls: 'alert',
                desc: 'Watchdog has detected a suspicious activity. Review your assets.'
            },
            sleeping: {
                label: 'Sleeping',
                cls: 'sleeping',
                desc: 'Watchdog is sleeping. Feed it to restore protection.'
            }
        };

        function applyWatchdogState(state) {
            const meta = STATE_META[state] || STATE_META[STATES.IDLE];
            badge.className = 'watchdog-state-badge ' + meta.cls;
            badgeText.textContent = meta.label;
            descEl.textContent = meta.desc;
            if (watchdog) watchdog.setState(state in STATES ? state : STATES.IDLE);
        }

        try { 
            watchdog = createWatchDog(watchdogContainer, { initialState: STATES.IDLE });
            applyWatchdogState(STATES.IDLE);
        } catch (e) {
            console.error('[SafeCode] Failed to create 3D watchdog:', e);
        }

        // React to watchdog:anomaly events from WatchdogACCBridge
        window.addEventListener('watchdog:anomaly', () => applyWatchdogState(STATES.ALERT));
        window.addEventListener('watchdog:alert', () => applyWatchdogState(STATES.WATCHING));

        // Sync state from parent watchdog status if available
        window.addEventListener('message', (event) => {
            if (event.data?.type === 'watchdog:state') {
                const s = event.data.state;
                applyWatchdogState(s || STATES.IDLE);
            }
        });
    </script>

    <script>
        // Inherit from parent if in iframe
        if (window !== window.parent) {
            if (window.parent.AssetBus) {
                window.AssetBus = window.parent.AssetBus;
            } else if (window.parent.parent && window.parent.parent.AssetBus) {
                window.AssetBus = window.parent.parent.AssetBus;
            }
        }

        window.addEventListener('DOMContentLoaded', function() {
            if (window.parent !== window) {
                setTimeout(() => {
                    window.parent.postMessage({ type: 'safe-code-ready' }, '*');
                }, 500);
            }
        });

        const statusIndicator = document.getElementById('status-indicator');
        const statusText = document.getElementById('status-text');
        const loadingContainer = document.getElementById('loading-container');
        const emptyState = document.getElementById('empty-state');
        const assetListContainer = document.getElementById('asset-list-container');
        const assetTabs = document.querySelectorAll('.asset-tab');

        let activeTab = 'codes';

        assetTabs.forEach(tab => {
            tab.addEventListener('click', function() {
                assetTabs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                activeTab = this.dataset.tab;
                renderAssets();
            });
        });

        function renderAssets() {
            if (!window.AssetBus) {
                showLoading();
                setTimeout(renderAssets, 300);
                return;
            }

            try { 
                const snapshot = window.AssetBus.snapshot();
                const assets = snapshot[activeTab] || [];

                if (assets.length === 0) {
                    showEmptyState();
                } else {
                    showAssetList(assets);
                }

                updateStatus('online', 'Connected');
            } catch (error) {
                console.error('[SafeCode] Error rendering assets:', error);
                updateStatus('offline', 'Error');
                showEmptyState();
            }
        }

        function showLoading() {
            loadingContainer.style.display = 'flex';
            emptyState.style.display = 'none';
            assetListContainer.style.display = 'none';
        }

        function showEmptyState() {
            loadingContainer.style.display = 'none';
            emptyState.style.display = 'block';
            assetListContainer.style.display = 'none';
        }

        function showAssetList(assets) {
            loadingContainer.style.display = 'none';
            emptyState.style.display = 'none';
            assetListContainer.style.display = 'grid';
            assetListContainer.innerHTML = '';

            assets.forEach(asset => {
                const assetItem = document.createElement('div');
                assetItem.className = 'asset-item';

                const valueClass = activeTab === 'codes' ? 'codes-value' :
                                    activeTab === 'silver' ? 'silver-value' : 'gold-value';

                const name = asset.name || (activeTab === 'codes' ? 'Code Asset' : 'Safe Asset');
                const description = asset.description || (activeTab === 'codes' ? 'Encrypted safe code' : 'Precious metal asset');
                const value = (asset && typeof asset === 'object') ? (asset.value || asset.code || '') : String(asset || '');

                assetItem.innerHTML = `
                    <h3><i class="fas fa-${getAssetIcon(activeTab)}"></i> ${name}</h3>
                    <p>${description}</p>
                    <div class="asset-value ${valueClass}">
                        ${formatAssetValue(value, activeTab)}
                    </div>
                `;

                assetListContainer.appendChild(assetItem);
            });
        }

        function getAssetIcon(type) {
            switch (type) {
                case 'codes': return 'code';
                case 'silver': return 'coins';
                case 'gold': return 'gem';
                default: return 'code';
            }
        }

        function formatAssetValue(value, type) {
            if (type === 'codes') return value;
            const num = Number(value);
            return isNaN(num) ? value : `$${num.toLocaleString()}`;
        }

        function updateStatus(status, text) {
            statusIndicator.className = `status-indicator ${status}`;
            statusText.textContent = text;
        }

        function subscribeToAssetBus() {
            if (window.AssetBus) {
                window.AssetBus.subscribe('safecode', () => {
                    renderAssets();
                });
            }
        }

        function initApp() {
            showLoading();
            updateStatus('connecting', 'Connecting...');

            const assetBusCheckInterval = setInterval(() => {
                if (window.AssetBus) {
                    clearInterval(assetBusCheckInterval);
                    subscribeToAssetBus();
                    renderAssets();
                }
            }, 300);

            setTimeout(() => {
                clearInterval(assetBusCheckInterval);
                if (!window.AssetBus) {
                    updateStatus('offline', 'AssetBus not available');
                    showEmptyState();
                }
            }, 10000);
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }
    </script>
</body>
</html>
