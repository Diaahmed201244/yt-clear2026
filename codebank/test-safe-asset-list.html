<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Safe Asset List - Test Suite</title>
  <style>
    body {
      font-family: 'Courier New', monospace;
      background-color: #0f172a;
      color: #eaeaea;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .header {
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid #334155;
    }

    .header h1 {
      margin: 0 0 10px 0;
      color: #3b82f6;
    }

    .header p {
      margin: 0;
      color: #94a3b8;
    }

    .test-controls {
      margin-bottom: 30px;
      padding: 20px;
      background-color: #1e293b;
      border-radius: 8px;
    }

    .test-controls button {
      padding: 10px 20px;
      margin-right: 10px;
      border: none;
      border-radius: 6px;
      background-color: #3b82f6;
      color: white;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      transition: background-color 0.2s ease;
    }

    .test-controls button:hover {
      background-color: #2563eb;
    }

    .test-controls button:disabled {
      background-color: #475569;
      cursor: not-allowed;
    }

    .test-results {
      padding: 20px;
      background-color: #1e293b;
      border-radius: 8px;
      min-height: 200px;
    }

    .test-results h2 {
      margin: 0 0 15px 0;
      font-size: 18px;
      color: #eaeaea;
    }

    .test-output {
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .test-output .success {
      color: #22c55e;
    }

    .test-output .error {
      color: #ef4444;
    }

    .test-output .info {
      color: #3b82f6;
    }

    .test-output .warning {
      color: #f59e0b;
    }

    .demo-section {
      margin-top: 30px;
      padding: 20px;
      background-color: #1e293b;
      border-radius: 8px;
    }

    .demo-section h2 {
      margin: 0 0 15px 0;
      font-size: 18px;
      color: #eaeaea;
    }

    .demo-controls {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .demo-controls button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      background-color: #475569;
      color: white;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      transition: background-color 0.2s ease;
    }

    .demo-controls button:hover {
      background-color: #64748b;
    }

    .demo-controls button.silver {
      background-color: #b0bec5;
      color: #1e293b;
    }

    .demo-controls button.gold {
      background-color: #ffb300;
      color: #1e293b;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      margin-left: 10px;
    }

    .status-badge.pending {
      background-color: #f59e0b;
      color: #1e293b;
    }

    .status-badge.running {
      background-color: #3b82f6;
      color: white;
    }

    .status-badge.completed {
      background-color: #22c55e;
      color: white;
    }

    .status-badge.failed {
      background-color: #ef4444;
      color: white;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Safe Asset List - Test Suite <span id="status-badge" class="status-badge pending">Pending</span></h1>
      <p>Comprehensive testing for the unified Safe Asset List renderer</p>
    </div>

    <div class="test-controls">
      <button id="run-tests-btn" onclick="runTests()">Run All Tests</button>
      <button id="clear-output-btn" onclick="clearOutput()">Clear Output</button>
    </div>

    <div class="test-results">
      <h2>Test Output</h2>
      <div id="test-output" class="test-output">Click "Run All Tests" to start...</div>
    </div>

    <div class="demo-section">
      <h2>Interactive Demo</h2>
      <div class="demo-controls">
        <button onclick="addCode()">Add Code</button>
        <button class="silver" onclick="addSilver()">Add Silver</button>
        <button class="gold" onclick="addGold()">Add Gold</button>
        <button onclick="switchTab('codes')">Show Codes</button>
        <button onclick="switchTab('silver')">Show Silver</button>
        <button onclick="switchTab('gold')">Show Gold</button>
      </div>
      <div id="demo-output" style="font-size: 12px; color: #94a3b8;">
        Use the buttons above to interact with the Safe Asset List component.
      </div>
    </div>
  </div>

  <!-- Load AssetBus -->
  <script type="module">
    import { AssetBus } from '../shared/local-asset-bus.js';
    window.AssetBus = AssetBus;
  </script>

  <!-- Load Test Suite -->
  <script src="test-safe-asset-list.js"></script>

  <!-- Test Runner -->
  <script>
    let testOutput = document.getElementById('test-output');
    let statusBadge = document.getElementById('status-badge');
    let runTestsBtn = document.getElementById('run-tests-btn');

    // Override console methods to capture output
    const originalLog = console.log;
    const originalError = console.error;
    const originalWarn = console.warn;

    function formatOutput(args) {
      return args.map(arg => {
        if (typeof arg === 'object') {
          return JSON.stringify(arg, null, 2);
        }
        return String(arg);
      }).join(' ');
    }

    console.log = function(...args) {
      originalLog.apply(console, args);
      const output = formatOutput(args);
      const line = document.createElement('div');
      line.className = 'success';
      line.textContent = output;
      testOutput.appendChild(line);
      testOutput.scrollTop = testOutput.scrollHeight;
    };

    console.error = function(...args) {
      originalError.apply(console, args);
      const output = formatOutput(args);
      const line = document.createElement('div');
      line.className = 'error';
      line.textContent = output;
      testOutput.appendChild(line);
      testOutput.scrollTop = testOutput.scrollHeight;
    };

    console.warn = function(...args) {
      originalWarn.apply(console, args);
      const output = formatOutput(args);
      const line = document.createElement('div');
      line.className = 'warning';
      line.textContent = output;
      testOutput.appendChild(line);
      testOutput.scrollTop = testOutput.scrollHeight;
    };

    function runTests() {
      testOutput.innerHTML = '';
      statusBadge.className = 'status-badge running';
      statusBadge.textContent = 'Running';
      runTestsBtn.disabled = true;

      // Enable test mode
      window.__TEST_MODE__ = true;

      // Run tests
      setTimeout(() => {
        try { 
          window.runSafeAssetListTests();
          
          // Update status after tests complete
          setTimeout(() => {
            statusBadge.className = 'status-badge completed';
            statusBadge.textContent = 'Completed';
            runTestsBtn.disabled = false;
          }, 3000);
        } catch (error) {
          console.error('Test suite failed:', error);
          statusBadge.className = 'status-badge failed';
          statusBadge.textContent = 'Failed';
          runTestsBtn.disabled = false;
        }
      }, 100);
    }

    function clearOutput() {
      testOutput.innerHTML = 'Click "Run All Tests" to start...';
    }

    // Demo functions
    function addCode() {
      if (!window.AssetBus) {
        updateDemoOutput('AssetBus not loaded yet');
        return;
      }
      const code = 'CODE-' + Math.random().toString(36).substring(2, 8).toUpperCase();
      window.AssetBus.addAsset('normal', code);
      updateDemoOutput(`Added code: ${code}`);
    }

    function addSilver() {
      if (!window.AssetBus) {
        updateDemoOutput('AssetBus not loaded yet');
        return;
      }
      const code = 'SLVR-' + Math.random().toString(36).substring(2, 8).toUpperCase();
      window.AssetBus.addAsset('silver', code);
      updateDemoOutput(`Added silver: ${code}`);
    }

    function addGold() {
      if (!window.AssetBus) {
        updateDemoOutput('AssetBus not loaded yet');
        return;
      }
      const code = 'GOLD-' + Math.random().toString(36).substring(2, 8).toUpperCase();
      window.AssetBus.addAsset('gold', code);
      updateDemoOutput(`Added gold: ${code}`);
    }

    function switchTab(tab) {
      if (!window.SafeAssetList) {
        updateDemoOutput('SafeAssetList not loaded yet');
        return;
      }
      window.SafeAssetList.render(tab);
      updateDemoOutput(`Switched to ${tab} tab`);
    }

    function updateDemoOutput(message) {
      const demoOutput = document.getElementById('demo-output');
      const timestamp = new Date().toLocaleTimeString();
      demoOutput.textContent = `[${timestamp}] ${message}`;
    }

    // Initialize
    window.addEventListener('load', () => {
      console.log('📦 Test page loaded');
      console.log('📝 Click "Run All Tests" to start the test suite');
    });
  </script>
</body>
</html>
