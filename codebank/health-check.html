<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeBank Health Check</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .status-ok { color: #10b981; }
        .status-error { color: #ef4444; }
        .status-warning { color: #f59e0b; }
        .card { background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(20px); }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-white mb-2">🏥 CodeBank Health Check</h1>
            <p class="text-gray-400">Diagnosing service issues</p>
        </div>

        <div class="card rounded-2xl p-6 mb-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-semibold text-white">Service Status</h2>
                <button onclick="runDiagnostic()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors">
                    <i class="fas fa-play mr-2"></i>Run Diagnostic
                </button>
            </div>
            
            <div id="diagnostic-results" class="space-y-3">
                <div class="text-center text-gray-400 py-8">
                    <i class="fas fa-spinner fa-spin text-2xl mb-2"></i>
                    <p>Click "Run Diagnostic" to check services</p>
                </div>
            </div>
        </div>

        <div class="card rounded-2xl p-6 mb-6">
            <h2 class="text-xl font-semibold text-white mb-4">Quick Service Test</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="service-buttons">
                <!-- Service buttons will be added here -->
            </div>
        </div>

        <div class="card rounded-2xl p-6">
            <h2 class="text-xl font-semibold text-white mb-4">System Information</h2>
            <div class="grid grid-cols-2 gap-4 text-sm">
                <div>
                    <span class="text-gray-400">Current URL:</span>
                    <span class="text-white ml-2" id="current-url"></span>
                </div>
                <div>
                    <span class="text-gray-400">Base Path:</span>
                    <span class="text-white ml-2" id="base-path"></span>
                </div>
                <div>
                    <span class="text-gray-400">User Agent:</span>
                    <span class="text-white ml-2 text-xs" id="user-agent"></span>
                </div>
                <div>
                    <span class="text-gray-400">Online:</span>
                    <span class="text-white ml-2" id="online-status"></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const services = [
            { id: 'safecode', name: 'SafeCode', icon: 'fa-shield-alt', color: '#10b981' },
            { id: 'samma3ny', name: 'Samma3ny', icon: 'fa-music', color: '#8b5cf6' },
            { id: 'e7ki', name: 'E7ki', icon: 'fa-comments', color: '#06b6d4' },
            { id: 'farragna', name: 'Farragna', icon: 'fa-chart-line', color: '#ec4899' },
            { id: 'pebalaash', name: 'Pebalaash', icon: 'fa-gamepad', color: '#f59e0b' },
            { id: 'corsa', name: 'CoRsA', icon: 'fa-brain', color: '#8b5cf6' },
            { id: 'eb3at', name: 'Eb3at', icon: 'fa-paper-plane', color: '#3b82f6' },
            { id: 'battalooda', name: 'Battalooda', icon: 'fa-microphone-alt', color: '#e74c3c' },
            { id: 'games', name: 'Games Centre', icon: 'fa-gamepad', color: '#f59e0b' },
            { id: 'yahood', name: 'Yahood!', icon: 'fa-pickaxe', color: '#8B4513' }
        ];

        // Initialize
        document.getElementById('current-url').textContent = window.location.href;
        document.getElementById('base-path').textContent = window.location.pathname.split('/').slice(0, -1).join('/') || '/';
        document.getElementById('user-agent').textContent = navigator.userAgent.substring(0, 50) + '...';
        document.getElementById('online-status').textContent = navigator.onLine ? '✅ Yes' : '❌ No';

        // Create service buttons
        const buttonsContainer = document.getElementById('service-buttons');
        services.forEach(service => {
            const btn = document.createElement('button');
            btn.className = 'p-4 rounded-xl bg-white/5 hover:bg-white/10 transition-all text-center';
            btn.style.borderColor = service.color;
            btn.style.borderWidth = '2px';
            btn.innerHTML = `
                <i class="fas ${service.icon} text-2xl mb-2" style="color: ${service.color}"></i>
                <div class="text-white text-sm font-medium">${service.name}</div>
            `;
            btn.onclick = () => testService(service);
            buttonsContainer.appendChild(btn);
        });

        async function runDiagnostic() {
            const resultsDiv = document.getElementById('diagnostic-results');
            resultsDiv.innerHTML = '<div class="text-center text-gray-400 py-4"><i class="fas fa-spinner fa-spin mr-2"></i>Running diagnostic...</div>';

            const results = [];

            for (const service of services) {
                const result = await checkService(service);
                results.push(result);
            }

            displayResults(results);
        }

        async function checkService(service) {
            const paths = [
                `./${service.id}.html`,
                `./${service.id}/index.html`,
                `/codebank/${service.id}.html`,
                `/codebank/${service.id}/index.html`
            ];

            for (const path of paths) {
                try { 
                    const startTime = performance.now();
                    const response = await fetch(path, { 
                        method: 'HEAD',
                        cache: 'no-cache'
                    });
                    const loadTime = Math.round(performance.now() - startTime);

                    if (response.ok) {
                        return {
                            ...service,
                            status: 'ok',
                            path: path,
                            loadTime: loadTime,
                            message: `Available at ${path}`
                        };
                    }
                } catch (error) {
                    // Continue to next path
                }
            }

            return {
                ...service,
                status: 'error',
                path: null,
                loadTime: null,
                message: 'Service not found at any known path'
            };
        }

        function displayResults(results) {
            const resultsDiv = document.getElementById('diagnostic-results');
            resultsDiv.innerHTML = '';

            const okCount = results.filter(r => r.status === 'ok').length;
            const errorCount = results.filter(r => r.status === 'error').length;

            // Summary
            const summary = document.createElement('div');
            summary.className = 'mb-6 p-4 rounded-xl ' + (errorCount === 0 ? 'bg-green-500/20 border border-green-500/30' : 'bg-yellow-500/20 border border-yellow-500/30');
            summary.innerHTML = `
                <div class="flex items-center justify-between">
                    <div>
                        <h3 class="text-lg font-semibold ${errorCount === 0 ? 'text-green-400' : 'text-yellow-400'}">
                            ${errorCount === 0 ? '✅ All Services Operational' : `⚠️ ${errorCount} Service(s) Need Attention`}
                        </h3>
                        <p class="text-gray-400 text-sm">${okCount} available, ${errorCount} unavailable</p>
                    </div>
                    <div class="text-3xl font-bold ${errorCount === 0 ? 'text-green-400' : 'text-yellow-400'}">
                        ${okCount}/${results.length}
                    </div>
                </div>
            `;
            resultsDiv.appendChild(summary);

            // Individual results
            results.forEach(result => {
                const item = document.createElement('div');
                item.className = 'flex items-center justify-between p-4 rounded-xl bg-white/5';
                
                const statusIcon = result.status === 'ok' ? '✅' : '❌';
                const statusClass = result.status === 'ok' ? 'status-ok' : 'status-error';
                
                item.innerHTML = `
                    <div class="flex items-center space-x-4">
                        <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background: ${result.color}20">
                            <i class="fas ${result.icon}" style="color: ${result.color}"></i>
                        </div>
                        <div>
                            <div class="text-white font-medium">${result.name}</div>
                            <div class="text-gray-400 text-sm">${result.message}</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="${statusClass} font-semibold">${statusIcon} ${result.status.toUpperCase()}</div>
                        ${result.loadTime ? `<div class="text-gray-500 text-xs">${result.loadTime}ms</div>` : ''}
                    </div>
                `;
                
                resultsDiv.appendChild(item);
            });

            // Recommendations
            if (errorCount > 0) {
                const recommendations = document.createElement('div');
                recommendations.className = 'mt-6 p-4 rounded-xl bg-blue-500/10 border border-blue-500/30';
                recommendations.innerHTML = `
                    <h4 class="text-blue-400 font-semibold mb-2">💡 Recommendations</h4>
                    <ul class="text-gray-400 text-sm space-y-1">
                        ${results.filter(r => r.status === 'error').map(r => `<li>• Check if ${r.id}.html exists in codebank directory</li>`).join('')}
                        <li>• Verify server is running and serving static files correctly</li>
                        <li>• Check browser console for specific error messages</li>
                        <li>• Try accessing services directly via URL</li>
                    </ul>
                `;
                resultsDiv.appendChild(recommendations);
            }
        }

        async function testService(service) {
            const path = `./${service.id}.html`;
            
            // Show loading toast
            showToast(`Testing ${service.name}...`, 'info');
            
            try { 
                const response = await fetch(path, { method: 'HEAD', cache: 'no-cache' });
                
                if (response.ok) {
                    showToast(`✅ ${service.name} is accessible`, 'success');
                    
                    // Open service in new tab
                    setTimeout(() => {
                        if (confirm(`Open ${service.name} in new tab?`)) {
                            window.open(path, '_blank');
                        }
                    }, 500);
                } else {
                    showToast(`❌ ${service.name} returned ${response.status}`, 'error');
                }
            } catch (error) {
                showToast(`❌ ${service.name} failed: ${error.message}`, 'error');
            }
        }

        function showToast(message, type = 'info') {
            const container = document.createElement('div');
            container.className = 'fixed top-4 right-4 z-50';
            
            const colors = {
                success: 'bg-green-600',
                error: 'bg-red-600',
                info: 'bg-blue-600',
                warning: 'bg-yellow-600'
            };
            
            container.innerHTML = `
                <div class="${colors[type]} text-white px-6 py-3 rounded-xl shadow-2xl transform transition-all duration-300 translate-x-full">
                    ${message}
                </div>
            `;
            
            document.body.appendChild(container);
            
            // Animate in
            setTimeout(() => {
                container.firstElementChild.classList.remove('translate-x-full');
            }, 10);
            
            // Remove after 3 seconds
            setTimeout(() => {
                container.firstElementChild.classList.add('translate-x-full');
                setTimeout(() => container.remove(), 300);
            }, 3000);
        }

        // Auto-run diagnostic on load
        window.addEventListener('load', () => {
            setTimeout(runDiagnostic, 1000);
        });
    </script>
</body>
</html>
