<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Bankode Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; padding: 1rem 1.5rem; }
  header { display: flex; gap: 0.75rem; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; }
  button { padding: 0.5rem 0.8rem; cursor: pointer; }
  #usersContainer { display: grid; gap: 0.5rem; margin-top: 1rem; }
</style>
</head>
<body>
<header>
  <div id="status" class="muted" aria-live="polite"></div>
  <div id="usersContainer"></div>
</section>

<script src="./config.js"></script>
<script type="module">
import { getAllUsers, getUserBalances, getAdminOverview } from './dashboard.js';
import { logoutUser } from './jwt-auth.js';

const statusEl = document.getElementById('status');
const usersContainer = document.getElementById('usersContainer');
document.getElementById('loadUsersBtn').addEventListener('click', async () => {
  try {
    statusEl.textContent = 'جاري التحميل...';
    usersContainer.innerHTML = '';
    const overview = await getAdminOverview();
    statusEl.textContent = `إجمالي المستخدمين: ${overview?.usersCount ?? '-'} | المعاملات: ${overview?.txCount ?? '-'} | سكّ: ${JSON.stringify(overview?.minted ?? {})}`;
    const users = await getAllUsers();
    for (const u of users) {
      const balances = await getUserBalances(u.user_id);
      const div = document.createElement('div');
      div.className = 'user-card';
      div.innerHTML = `<strong>${u.full_name || u.email || u.user_id}</strong><br>Codes: ${balances.codes} | Silver: ${balances.silver} | Gold: ${balances.gold}`;
      usersContainer.appendChild(div);
    }
  } catch (err) {
    statusEl.textContent = 'خطأ: ' + (err?.message || 'Unknown error');
  }
});

document.getElementById('logoutBtn').addEventListener('click', () => {
  logoutUser();
  window.location.href = 'admin-login.html';
});
</script>
</body>
</html>
