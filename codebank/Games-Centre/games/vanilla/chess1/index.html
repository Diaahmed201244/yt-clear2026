<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Game</title>
    <link rel="stylesheet" href="c1.css">
    <link rel="stylesheet" href="../_shared/common-styles.css">
</head>
<body>
    <!-- Multiplayer Mode Selection UI -->
    <div id="mode-selection" class="mode-selection-overlay">
        <div class="mode-selection-content">
            <h2>Select Game Mode</h2>
            <div class="mode-options">
                <button data-mode="practice" class="btn selected">Practice</button>
                <button data-mode="ai" class="btn">VS Computer</button>
                <button data-mode="multiplayer" class="btn">Live Match</button>
            </div>
            <button id="start-selected-mode" class="btn btn-primary">Start Game</button>
        </div>
    </div>

    <div class="chess-container">
        <div class="chess-board" id="chessBoard"></div>
        <div class="game-info">
            <div class="current-player">Current Player: <span id="currentPlayer">White</span></div>
            <div class="game-status" id="gameStatus">Game in progress</div>
            <button id="newGameBtn">New Game</button>
            <button id="resetBtn">Reset</button>
        </div>
    </div>
    <script src="c1.js"></script>
    <script type="module" src="../_shared/game-integration.js"></script>
</body>
</html>
