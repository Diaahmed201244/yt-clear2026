<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>River Raid</title>
    <link rel="stylesheet" href="rr.css">
    <link rel="stylesheet" href="../_shared/common-styles.css">
</head>
<body>
    <div class="river-raid-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="game-ui">
            <div class="fuel">Fuel: <span id="fuel">100</span></div>
            <div class="score">Score: <span id="score">0</span></div>
            <div class="high-score">High Score: <span id="highScore">0</span></div>
            <div class="level">Level: <span id="level">1</span></div>
        </div>
        <div class="controls">
            <button id="startBtn">Start Game</button>
            <button id="pauseBtn">Pause</button>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="rr.js"></script>
    <script type="module" src="../_shared/game-integration.js"></script>
</body>
</html>
