<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="/web-v1/css/games.css">
    <link rel="stylesheet" href="/web-v1/css/tictactoe.css">
</head>
<body>
    <div class="game-container">
        <h1>Tic Tac Toe</h1>
        <div id="game-status" class="status"></div>
        <div id="tictactoe-board" class="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>
        <div class="controls">
            <button id="restart" class="game-btn">Restart</button>
            <button onclick="window.location.href='../index.html'" class="back-btn">Back to Games</button>
        </div>
    </div>
    <script src="/web-v1/js/tictactoe.js"></script>
</body>
</html>
