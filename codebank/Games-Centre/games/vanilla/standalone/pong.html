<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 2px solid #00ff00;
            background: #000;
        }
        #score {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #00ff00;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div id="score">0 - 0</div>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');

        canvas.width = 800;
        canvas.height = 400;

        const PADDLE_HEIGHT = 100;
        const PADDLE_WIDTH = 10;
        const BALL_SIZE = 10;
        const BALL_SPEED = 5;
        let ballSpeedX = BALL_SPEED;
        let ballSpeedY = BALL_SPEED;

        let player = {
            y: canvas.height / 2 - PADDLE_HEIGHT / 2,
            score: 0
        };

        let computer = {
            y: canvas.height / 2 - PADDLE_HEIGHT / 2,
            score: 0
        };

        let ball = {
            x: canvas.width / 2,
            y: canvas.height / 2
        };

        function drawRect(x, y, width, height, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, width, height);
        }

        function drawCircle(x, y, radius, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2, false);
            ctx.fill();
        }

        function update() {
            // Move the ball
            ball.x += ballSpeedX;
            ball.y += ballSpeedY;

            // Ball collision with top and bottom
            if (ball.y < 0 || ball.y > canvas.height) {
                ballSpeedY = -ballSpeedY;
            }

            // Computer AI
            const computerCenter = computer.y + PADDLE_HEIGHT / 2;
            if (computerCenter < ball.y - 35) {
                computer.y += 4;
            } else if (computerCenter > ball.y + 35) {
                computer.y -= 4;
            }

            // Ball collision with paddles
            if (ball.x < PADDLE_WIDTH && ball.y > player.y && ball.y < player.y + PADDLE_HEIGHT) {
                ballSpeedX = -ballSpeedX;
                const deltaY = ball.y - (player.y + PADDLE_HEIGHT / 2);
                ballSpeedY = deltaY * 0.15;
            }

            if (ball.x > canvas.width - PADDLE_WIDTH && ball.y > computer.y && ball.y < computer.y + PADDLE_HEIGHT) {
                ballSpeedX = -ballSpeedX;
                const deltaY = ball.y - (computer.y + PADDLE_HEIGHT / 2);
                ballSpeedY = deltaY * 0.15;
            }

            // Scoring
            if (ball.x < 0) {
                computer.score++;
                resetBall();
            } else if (ball.x > canvas.width) {
                player.score++;
                resetBall();
            }

            scoreDisplay.textContent = `${player.score} - ${computer.score}`;
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ballSpeedX = -ballSpeedX;
            ballSpeedY = Math.random() * 10 - 5;
        }

        function draw() {
            // Clear canvas
            drawRect(0, 0, canvas.width, canvas.height, '#000');

            // Draw paddles
            drawRect(0, player.y, PADDLE_WIDTH, PADDLE_HEIGHT, '#00ff00');
            drawRect(canvas.width - PADDLE_WIDTH, computer.y, PADDLE_WIDTH, PADDLE_HEIGHT, '#00ff00');

            // Draw ball
            drawCircle(ball.x, ball.y, BALL_SIZE, '#00ff00');

            // Draw center line
            for(let i = 0; i < canvas.height; i += 40) {
                drawRect(canvas.width/2 - 1, i, 2, 20, '#00ff00');
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Mouse movement
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            player.y = e.clientY - rect.top - PADDLE_HEIGHT / 2;

            // Keep paddle inside the canvas
            if (player.y < 0) {
                player.y = 0;
            }
            if (player.y > canvas.height - PADDLE_HEIGHT) {
                player.y = canvas.height - PADDLE_HEIGHT;
            }
        });

        gameLoop();
    </script>
</body>
</html>
