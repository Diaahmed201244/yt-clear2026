<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spinner Game</title>
    <link rel="stylesheet" href="/web-v1/css/games.css">
    <link rel="stylesheet" href="/web-v1/css/spinner.css">
</head>
<body>
    <div class="game-container">
        <h1>Spinner Game</h1>
        <div id="spinner-wheel" class="spinner">
            <div class="spinner-inner"></div>
        </div>
        <button id="spin-btn" class="spin-button">SPIN</button>
        <div id="result" class="result"></div>
        <div class="controls">
            <button onclick="window.location.href='../index.html'" class="back-btn">Back to Games</button>
        </div>
    </div>
    <script src="/web-v1/js/spinner.js"></script>
</body>
</html>
