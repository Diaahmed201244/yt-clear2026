<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dominos - Games Centre</title>
    <link rel="stylesheet" href="/web-v1/css/games.css">
    <link rel="stylesheet" href="/web-v1/css/dominos.css">
</head>
<body>
    <div class="game-container">
        <h1>Dominos</h1>
        <div id="game-status" class="game-status"></div>
        <div class="score-display">Score: <span id="score">0</span></div>
        
        <div id="computer-hand" class="hand computer-hand"></div>
        <div id="board" class="board"></div>
        <div id="player-hand" class="hand player-hand"></div>
        
        <div class="controls">
            <button id="new-game" class="game-btn">New Game</button>
            <button onclick="window.location.href='../index.html'" class="back-btn">Back to Games</button>
        </div>
        
        <div class="instructions">
            <h3>How to Play:</h3>
            <ul>
                <li>Click a domino in your hand to play it</li>
                <li>Match the numbers at either end of the board</li>
                <li>First player to use all their dominoes wins!</li>
            </ul>
        </div>
    </div>
    <script src="/web-v1/js/dominos.js"></script>
</body>
</html>
