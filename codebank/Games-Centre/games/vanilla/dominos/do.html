<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dominos Game</title>
    <link rel="stylesheet" href="do.css">
</head>
<body>
    <div class="dominos-container">
        <div class="game-board" id="gameBoard"></div>
        <div class="player-hand" id="playerHand"></div>
        <div class="game-info">
            <div class="score">Score: <span id="score">0</span></div>
            <div id="scores">Player 1: 0 | Player 2: 0 | High: 0</div>
            <button id="newGameBtn">New Game</button>
            <button id="drawBtn">Draw Tile</button>
            <button id="aiToggle">AI: OFF</button>
        </div>
    </div>
    <script src="do.js"></script>
</body>
</html>
